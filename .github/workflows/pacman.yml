name: Generate Pacman Contribution Graph

on:
  schedule:
    - cron: "0 */12 * * *"   # runs every 12 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate pacman-style contribution graph
        uses: Platane/snk@v3
        with:
          github_user_name: vipinchaudhry
          outputs: |
            dist/pacman.svg?palette=github-dark&color_snake=#FFD700&color_dots=#00FFAA,#00CCFF,#FF00FF,#FF0000
            dist/pacman-light.svg?palette=github-light&color_snake=#FFD700&color_dots=#00FFAA,#00CCFF,#FF00FF,#FF0000

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
